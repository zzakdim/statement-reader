[tool.black]
line-length = 100
target-version = ["py310"]
include = "outreach_video_swarm/tools/.*\\.py$"

[tool.ruff]
line-length = 100
target-version = "py310"

[tool.ruff.lint]
select = ["E", "F", "I", "UP"]
ignore = ["E501"]

[tool.ruff.format]
quote-style = "double"
indent-style = "space"
line-ending = "lf"
